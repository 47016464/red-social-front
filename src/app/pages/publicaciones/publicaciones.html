<div class="feed-page">

  <!-- Navbar -->
  <nav class="topbar">
    <div class="topbar-brand" routerLink="/publicaciones">
      <div class="topbar-logo">
        <lucide-icon [img]="Rocket" size="18" color="white"></lucide-icon>
      </div>
      <span>Orbit</span>
    </div>
    <div class="topbar-actions">
      <a routerLink="/publicaciones" class="topbar-link active">
        <lucide-icon [img]="Home" size="18"></lucide-icon>
        <span>Inicio</span>
      </a>
      <a routerLink="/mi-perfil" class="topbar-link">
        <lucide-icon [img]="User" size="18"></lucide-icon>
        <span>Mi Perfil</span>
      </a>
      <button class="topbar-logout" (click)="logout()">
        <lucide-icon [img]="LogOut" size="16"></lucide-icon>
      </button>
    </div>
  </nav>

  <div class="feed-body">

    <!-- Header con ordenamiento -->
    <div class="feed-header">
      <h2>Inicio</h2>
      <div class="feed-controls">
        <div class="orden-btns">
          <button class="btn-orden" [class.activo]="ordenamiento() === 'fecha'"
            (click)="cambiarOrden('fecha')">
            📅 Fecha
          </button>
          <button class="btn-orden" [class.activo]="ordenamiento() === 'likes'"
            (click)="cambiarOrden('likes')">
            ❤️ Likes
          </button>
        </div>
        <button class="btn-new-post" (click)="newPostModal.set(true)">
          <lucide-icon [img]="Plus" size="16"></lucide-icon>
          Nueva publicación
        </button>
      </div>
    </div>

    <!-- Lista de publicaciones como componentes -->
    <app-publicacion-card
      *ngFor="let post of publicacionesPaginadas()"
      [post]="post"
      (onLike)="toggleLike($event)"
      (onEliminar)="eliminarPost($event)"
      (oncomentar)="agregarComentario($event)">
    </app-publicacion-card>

    <!-- Sin publicaciones -->
    <div class="empty-state" *ngIf="publicacionesPaginadas().length === 0">
      <p>No hay publicaciones para mostrar.</p>
    </div>

    <!-- Paginación -->
    <div class="pagination" *ngIf="totalPaginas() > 1">
      <button class="btn-pag" (click)="paginaAnterior()" [disabled]="paginaActual() === 1">
        <lucide-icon [img]="ChevronLeft" size="16"></lucide-icon>
      </button>
      <span class="pag-info">{{ paginaActual() }} / {{ totalPaginas() }}</span>
      <button class="btn-pag" (click)="paginaSiguiente()" [disabled]="paginaActual() === totalPaginas()">
        <lucide-icon [img]="ChevronRight" size="16"></lucide-icon>
      </button>
    </div>

  </div>
</div>

<!-- Modal nueva publicación -->
<div class="modal-overlay" *ngIf="newPostModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h4>Nueva publicación</h4>
      <button class="btn-close-modal" (click)="newPostModal.set(false)">
        <lucide-icon [img]="X" size="18"></lucide-icon>
      </button>
    </div>
    <div class="mb-3">
      <label class="form-label">Título *</label>
      <input class="form-control" [(ngModel)]="nuevaPublicacion.titulo"
        placeholder="Título de la publicación" />
    </div>
    <div class="mb-3">
      <label class="form-label">Mensaje *</label>
      <textarea class="form-control" [(ngModel)]="nuevaPublicacion.mensaje"
        placeholder="¿Qué querés compartir?" rows="4"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Imagen (opcional)</label>
      <input type="file" class="form-control" accept="image/*" (change)="onImagenChange($event)" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" (click)="newPostModal.set(false)">Cancelar</button>
      <button class="btn btn-primary" (click)="submitPost()">
        <lucide-icon [img]="Rocket" size="14" class="me-1"></lucide-icon>
        Publicar
      </button>
    </div>
  </div>
</div>

<!-- Modal éxito -->
<div class="modal-overlay" *ngIf="successModal()">
  <div class="modal-box" style="text-align:center">
    <div class="modal-icon success">✓</div>
    <h3>¡Publicado!</h3>
    <p>Tu publicación fue agregada correctamente.</p>
    <button class="btn btn-primary w-100" (click)="successModal.set(false)">Aceptar</button>
  </div>
</div>
